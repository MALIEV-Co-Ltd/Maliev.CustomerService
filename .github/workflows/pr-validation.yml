name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Set SharedLibraryVersion format
        run: |
          # Determine version format based on target branch
          BASE_BRANCH="${{ github.base_ref }}"
          if [ "$BASE_BRANCH" == "main" ]; then
            VERSION_FORMAT="1.0.*"
          else
            VERSION_FORMAT="1.0.*-*"
          fi
          echo "VERSION_FORMAT=$VERSION_FORMAT" >> $GITHUB_ENV
          echo "Target branch is $BASE_BRANCH. Using version format: $VERSION_FORMAT"

      - name: Restore dependencies
        run: dotnet restore Maliev.CustomerService.slnx -p:SharedLibraryVersion=${{ env.VERSION_FORMAT }}
        env:
          NUGET_USERNAME: ${{ github.actor }}
          NUGET_PASSWORD: ${{ secrets.GITOPS_PAT }}

      - name: Build
        run: dotnet build Maliev.CustomerService.slnx --no-restore --configuration Release -p:SharedLibraryVersion=${{ env.VERSION_FORMAT }}

      - name: Test
        run: dotnet test Maliev.CustomerService.slnx --no-build --configuration Release --verbosity normal -p:SharedLibraryVersion=${{ env.VERSION_FORMAT }}
        working-directory: ${{ github.workspace }}

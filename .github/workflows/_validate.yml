name: Reusable Validation

on:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Maliev.CustomerService.sln --configfile nuget.validation.config --locked-mode

      - name: Audit dependencies
        run: dotnet list Maliev.CustomerService.sln package --vulnerable --include-transitive

      - name: Build
        run: dotnet build Maliev.CustomerService.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Maliev.CustomerService.sln --configuration Release --no-build --no-restore --verbosity normal
